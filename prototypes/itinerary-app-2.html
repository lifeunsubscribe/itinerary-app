<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderly - Travel Itinerary Planner</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .icon {
            display: inline-block;
            width: 1em;
            height: 1em;
            vertical-align: middle;
        }

        .destination-card {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .destination-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .destination-overlay {
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.3) 50%, transparent 100%);
        }

        .suggestion-card {
            transition: all 0.3s ease;
        }

        .suggestion-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .activity-type-badge {
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .calendar-day:hover {
            background-color: #f3f4f6;
        }

        .calendar-day.selected {
            background-color: #3b82f6;
            color: white;
        }

        .calendar-day.in-range {
            background-color: #dbeafe;
            color: #1d4ed8;
        }

        .modal-backdrop {
            backdrop-filter: blur(4px);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Simple icon components
        const Icons = {
            Plus: () => React.createElement('span', { className: 'icon' }, '+'),
            MapPin: () => React.createElement('span', { className: 'icon' }, '📍'),
            Clock: () => React.createElement('span', { className: 'icon' }, '🕐'),
            Calendar: () => React.createElement('span', { className: 'icon' }, '📅'),
            Trash2: () => React.createElement('span', { className: 'icon' }, '🗑️'),
            Edit3: () => React.createElement('span', { className: 'icon' }, '✏️'),
            Save: () => React.createElement('span', { className: 'icon' }, '💾'),
            X: () => React.createElement('span', { className: 'icon' }, '✕'),
            Map: () => React.createElement('span', { className: 'icon' }, '🗺️'),
            Search: () => React.createElement('span', { className: 'icon' }, '🔍'),
            Star: () => React.createElement('span', { className: 'icon' }, '⭐'),
            Loading: () => React.createElement('span', { className: 'icon animate-spin' }, '⏳'),
            Filter: () => React.createElement('span', { className: 'icon' }, '🔽'),
            Image: () => React.createElement('span', { className: 'icon' }, '🖼️'),
            Users: () => React.createElement('span', { className: 'icon' }, '👥'),
            Share: () => React.createElement('span', { className: 'icon' }, '📤'),
            Heart: () => React.createElement('span', { className: 'icon' }, '❤️'),
            ChevronLeft: () => React.createElement('span', { className: 'icon' }, '‹'),
            ChevronRight: () => React.createElement('span', { className: 'icon' }, '›'),
        };

        // Popular destinations with iconic photos
        const POPULAR_DESTINATIONS = [
            {
                name: "Paris, France",
                image: "https://images.unsplash.com/photo-1431274172761-fca41d930114?w=400&h=300&fit=crop",
                description: "City of Love and Lights"
            },
            {
                name: "Tokyo, Japan",
                image: "https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=400&h=300&fit=crop",
                description: "Modern metropolis meets tradition"
            },
            {
                name: "New York, NY",
                image: "https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?w=400&h=300&fit=crop",
                description: "The city that never sleeps"
            },
            {
                name: "Rome, Italy",
                image: "https://images.unsplash.com/photo-1552832230-c0197dd311b5?w=400&h=300&fit=crop",
                description: "Eternal city of history"
            },
            {
                name: "Bali, Indonesia",
                image: "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=400&h=300&fit=crop",
                description: "Tropical paradise"
            },
            {
                name: "London, UK",
                image: "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=400&h=300&fit=crop",
                description: "Royal heritage and culture"
            }
        ];

        // Activity types for TripAdvisor API
        const ACTIVITY_TYPES = [
            { value: 'restaurants', label: 'Food & Dining', emoji: '🍽️' },
            { value: 'attractions', label: 'Attractions & Tours', emoji: '🎭' },
            { value: 'hotels', label: 'Hotels & Lodging', emoji: '🏨' },
            { value: 'geos', label: 'Places & Areas', emoji: '📍' },
            { value: 'activities', label: 'Activities & Entertainment', emoji: '🎪' }
        ];

        const ItineraryApp = () => {
            const [itineraries, setItineraries] = useState([]);
            const [currentItinerary, setCurrentItinerary] = useState(null);
            const [showNewItinerary, setShowNewItinerary] = useState(false);
            const [editingActivity, setEditingActivity] = useState(null);
            const [showMap, setShowMap] = useState(false);
            const [isGoogleMapsLoaded, setIsGoogleMapsLoaded] = useState(false);
            const [showSuggestions, setShowSuggestions] = useState(false);
            const [suggestions, setSuggestions] = useState([]);
            const [loadingSuggestions, setLoadingSuggestions] = useState(false);
            const [selectedActivityType, setSelectedActivityType] = useState('restaurants');
            const [tripAdvisorApiKey, setTripAdvisorApiKey] = useState('');
            const [showApiKeyModal, setShowApiKeyModal] = useState(false);
            const [currentStep, setCurrentStep] = useState('destination'); // destination, dates, guests, sharing
            const [calendarMonth, setCalendarMonth] = useState(new Date());
            const [selectedDates, setSelectedDates] = useState({ start: null, end: null });
            const [guestCount, setGuestCount] = useState(1);
            const [collaborators, setCollaborators] = useState([]);
            const [newCollaboratorEmail, setNewCollaboratorEmail] = useState('');

            const destinationInputRef = useRef(null);
            const locationInputRef = useRef(null);
            const mapRef = useRef(null);
            const autocompleteRefs = useRef({});

            const [newItineraryForm, setNewItineraryForm] = useState({
                title: '',
                destination: '',
                startDate: '',
                endDate: ''
            });

            const [newActivityForm, setNewActivityForm] = useState({
                title: '',
                time: '',
                location: '',
                description: '',
                date: ''
            });

            // Get destination image
            const getDestinationImage = (destination) => {
                const popular = POPULAR_DESTINATIONS.find(dest =>
                    destination.toLowerCase().includes(dest.name.toLowerCase().split(',')[0])
                );
                if (popular) return popular.image;

                // Fallback based on country/region
                const fallbacks = {
                    'france': 'https://images.unsplash.com/photo-1431274172761-fca41d930114?w=400&h=300&fit=crop',
                    'japan': 'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=400&h=300&fit=crop',
                    'italy': 'https://images.unsplash.com/photo-1552832230-c0197dd311b5?w=400&h=300&fit=crop',
                    'spain': 'https://images.unsplash.com/photo-1544943905-6ad2c5b6e5e7?w=400&h=300&fit=crop',
                    'greece': 'https://images.unsplash.com/photo-1533105079780-92b9be482077?w=400&h=300&fit=crop',
                    'thailand': 'https://images.unsplash.com/photo-1528181304800-259b08848526?w=400&h=300&fit=crop',
                    'uk': 'https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=400&h=300&fit=crop',
                    'usa': 'https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?w=400&h=300&fit=crop'
                };

                for (const [country, image] of Object.entries(fallbacks)) {
                    if (destination.toLowerCase().includes(country)) {
                        return image;
                    }
                }

                return 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400&h=300&fit=crop';
            };

            // Load saved API key on mount
            useEffect(() => {
                const savedApiKey = localStorage.getItem('tripAdvisorApiKey');
                if (savedApiKey) {
                    setTripAdvisorApiKey(savedApiKey);
                } else {
                    const apiKey = 'EC83D5B656574764AFF42DD9E0960BE3';
                    setTripAdvisorApiKey(apiKey);
                    localStorage.setItem('tripAdvisorApiKey', apiKey);
                }
            }, []);

            // Load Google Maps API
            useEffect(() => {
                if (window.google && window.google.maps) {
                    setIsGoogleMapsLoaded(true);
                    return;
                }

                const script = document.createElement('script');
                script.src = `https://maps.googleapis.com/maps/api/js?key=AIzaSyBqOElaccMFiQmEbW1ly0JyaTeUJBcvebY&libraries=places&loading=async`;
                script.async = true;
                script.defer = true;
                script.onload = () => {
                    setIsGoogleMapsLoaded(true);
                };
                script.onerror = (error) => {
                    console.warn('Google Maps API failed to load:', error);
                };
                document.body.appendChild(script);

                return () => {
                    document.body.removeChild(script);
                };
            }, []);

            // Initialize autocomplete for activity location input
            useEffect(() => {
                if (isGoogleMapsLoaded && locationInputRef.current && window.google && currentItinerary) {
                    try {
                        const autocomplete = new window.google.maps.places.Autocomplete(
                            locationInputRef.current,
                            {
                                fields: ['formatted_address', 'geometry', 'name']
                            }
                        );

                        autocomplete.addListener('place_changed', () => {
                            const place = autocomplete.getPlace();
                            if (place && place.formatted_address) {
                                setNewActivityForm(prev => ({
                                    ...prev,
                                    location: place.formatted_address
                                }));
                            }
                        });

                        autocompleteRefs.current.location = autocomplete;
                    } catch (error) {
                        console.warn('Failed to initialize location autocomplete:', error);
                    }
                }
            }, [isGoogleMapsLoaded, currentItinerary]);

            // Calendar functions
            const getDaysInMonth = (date) => {
                return new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            };

            const getFirstDayOfMonth = (date) => {
                return new Date(date.getFullYear(), date.getMonth(), 1).getDay();
            };

            const isDateInRange = (date) => {
                if (!selectedDates.start || !selectedDates.end) return false;
                return date >= selectedDates.start && date <= selectedDates.end;
            };

            const handleDateClick = (day) => {
                const clickedDate = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth(), day);

                if (!selectedDates.start || (selectedDates.start && selectedDates.end)) {
                    setSelectedDates({ start: clickedDate, end: null });
                } else if (clickedDate < selectedDates.start) {
                    setSelectedDates({ start: clickedDate, end: selectedDates.start });
                } else {
                    setSelectedDates({ ...selectedDates, end: clickedDate });
                }
            };

            const formatDateRange = () => {
                if (!selectedDates.start) return 'Select dates';
                if (!selectedDates.end) return selectedDates.start.toLocaleDateString();
                return `${selectedDates.start.toLocaleDateString()} - ${selectedDates.end.toLocaleDateString()}`;
            };

            const addCollaborator = () => {
                if (newCollaboratorEmail && !collaborators.includes(newCollaboratorEmail)) {
                    setCollaborators([...collaborators, newCollaboratorEmail]);
                    setNewCollaboratorEmail('');
                }
            };

            const removeCollaborator = (email) => {
                setCollaborators(collaborators.filter(c => c !== email));
            };

            // TripAdvisor API integration with CORS proxy
            const searchTripAdvisorSuggestions = async (location, activityType) => {
                setLoadingSuggestions(true);
                setSuggestions([]);

                try {
                    const proxyUrl = 'https://api.allorigins.win/raw?url=';
                    const searchUrl = `${proxyUrl}${encodeURIComponent(`https://api.content.tripadvisor.com/api/v1/location/search?key=${tripAdvisorApiKey}&searchQuery=${encodeURIComponent(location)}&language=en`)}`;

                    const searchResponse = await fetch(searchUrl);

                    if (!searchResponse.ok) {
                        throw new Error(`Search failed: ${searchResponse.status}`);
                    }

                    const searchData = await searchResponse.json();

                    if (!searchData.data || searchData.data.length === 0) {
                        throw new Error('No location found');
                    }

                    const locationId = searchData.data[0].location_id;

                    let endpoint;
                    switch (activityType) {
                        case 'restaurants':
                            endpoint = 'restaurants';
                            break;
                        case 'attractions':
                            endpoint = 'attractions';
                            break;
                        case 'hotels':
                            endpoint = 'hotels';
                            break;
                        default:
                            endpoint = 'attractions';
                    }

                    const suggestionsUrl = `${proxyUrl}${encodeURIComponent(`https://api.content.tripadvisor.com/api/v1/location/${locationId}/${endpoint}?key=${tripAdvisorApiKey}&language=en&limit=10`)}`;

                    const suggestionsResponse = await fetch(suggestionsUrl);

                    if (!suggestionsResponse.ok) {
                        throw new Error(`Suggestions failed: ${suggestionsResponse.status}`);
                    }

                    const suggestionsData = await suggestionsResponse.json();
                    setSuggestions(suggestionsData.data || []);

                } catch (error) {
                    console.warn('TripAdvisor API not accessible, using demo data:', error.message);

                    const generateMockData = (location, type) => {
                        const baseData = {
                            restaurants: [
                                {
                                    location_id: `rest_${Date.now()}_1`,
                                    name: `Local Bistro in ${location.split(',')[0]}`,
                                    description: 'Authentic local cuisine with fresh ingredients and traditional recipes. Highly recommended by locals.',
                                    rating: '4.5',
                                    num_reviews: '1,234',
                                    address: `${location.split(',')[0]} Historic District`,
                                    photo: { images: { medium: { url: 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=300&h=200&fit=crop' } } },
                                    cuisine: [{ name: 'Local' }]
                                },
                                {
                                    location_id: `rest_${Date.now()}_2`,
                                    name: `Fine Dining Restaurant`,
                                    description: 'Upscale dining experience with creative dishes and excellent service. Perfect for special occasions.',
                                    rating: '4.7',
                                    num_reviews: '856',
                                    address: `Downtown ${location.split(',')[0]}`,
                                    photo: { images: { medium: { url: 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=300&h=200&fit=crop' } } },
                                    cuisine: [{ name: 'International' }]
                                }
                            ],
                            attractions: [
                                {
                                    location_id: `attr_${Date.now()}_1`,
                                    name: `${location.split(',')[0]} Historic Center`,
                                    description: 'Explore the rich history and culture of this beautiful destination with guided tours and stunning architecture.',
                                    rating: '4.6',
                                    num_reviews: '2,567',
                                    address: `Central ${location.split(',')[0]}`,
                                    photo: { images: { medium: { url: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=300&h=200&fit=crop' } } }
                                },
                                {
                                    location_id: `attr_${Date.now()}_2`,
                                    name: 'Local Museum',
                                    description: 'Discover fascinating exhibits showcasing local art, history, and culture. Interactive displays for all ages.',
                                    rating: '4.3',
                                    num_reviews: '1,890',
                                    address: `Museum District, ${location.split(',')[0]}`,
                                    photo: { images: { medium: { url: 'https://images.unsplash.com/photo-1554907984-15263bfd63bd?w=300&h=200&fit=crop' } } }
                                }
                            ],
                            hotels: [
                                {
                                    location_id: `hotel_${Date.now()}_1`,
                                    name: `Luxury Hotel ${location.split(',')[0]}`,
                                    description: 'Premium accommodation with world-class amenities, spa services, and exceptional hospitality.',
                                    rating: '4.8',
                                    num_reviews: '1,456',
                                    address: `Luxury District, ${location.split(',')[0]}`,
                                    photo: { images: { medium: { url: 'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=300&h=200&fit=crop' } } }
                                }
                            ]
                        };

                        return baseData[type] || baseData.attractions;
                    };

                    setSuggestions(generateMockData(location, activityType));
                }

                setLoadingSuggestions(false);
            };

            const addSuggestionAsActivity = (suggestion) => {
                const activity = {
                    id: Date.now(),
                    title: suggestion.name,
                    location: suggestion.address || suggestion.location_string || '',
                    description: `${suggestion.description || ''}\n\nRating: ${suggestion.rating || 'N/A'} (${suggestion.num_reviews || 0} reviews)\nSource: TripAdvisor`,
                    date: newActivityForm.date || new Date().toISOString().split('T')[0],
                    time: '',
                    image: suggestion.photo?.images?.medium?.url || '',
                    rating: suggestion.rating,
                    source: 'tripadvisor'
                };

                const updatedItinerary = {
                    ...currentItinerary,
                    activities: [...currentItinerary.activities, activity].sort((a, b) =>
                        new Date(a.date + ' ' + (a.time || '00:00')) - new Date(b.date + ' ' + (b.time || '00:00'))
                    )
                };

                setCurrentItinerary(updatedItinerary);
                setItineraries(itineraries.map(it => it.id === currentItinerary.id ? updatedItinerary : it));
                setShowSuggestions(false);
            };

            const createItinerary = () => {
                if (!newItineraryForm.destination) return;

                const itinerary = {
                    id: Date.now(),
                    title: newItineraryForm.title || `Trip to ${newItineraryForm.destination.split(',')[0]}`,
                    destination: newItineraryForm.destination,
                    startDate: selectedDates.start ? selectedDates.start.toISOString().split('T')[0] : '',
                    endDate: selectedDates.end ? selectedDates.end.toISOString().split('T')[0] : '',
                    guestCount: guestCount,
                    collaborators: collaborators,
                    activities: [],
                    image: getDestinationImage(newItineraryForm.destination)
                };

                setItineraries([...itineraries, itinerary]);
                setCurrentItinerary(itinerary);
                resetNewItineraryForm();
            };

            const resetNewItineraryForm = () => {
                setNewItineraryForm({ title: '', destination: '', startDate: '', endDate: '' });
                setShowNewItinerary(false);
                setCurrentStep('destination');
                setSelectedDates({ start: null, end: null });
                setGuestCount(1);
                setCollaborators([]);
                setNewCollaboratorEmail('');
            };

            const addActivity = () => {
                if (!newActivityForm.title || !newActivityForm.date) return;

                const activity = {
                    id: Date.now(),
                    ...newActivityForm,
                    source: 'manual'
                };

                const updatedItinerary = {
                    ...currentItinerary,
                    activities: [...currentItinerary.activities, activity].sort((a, b) =>
                        new Date(a.date + ' ' + (a.time || '00:00')) - new Date(b.date + ' ' + (b.time || '00:00'))
                    )
                };

                setCurrentItinerary(updatedItinerary);
                setItineraries(itineraries.map(it => it.id === currentItinerary.id ? updatedItinerary : it));
                setNewActivityForm({ title: '', time: '', location: '', description: '', date: '' });
            };

            const deleteActivity = (activityId) => {
                const updatedItinerary = {
                    ...currentItinerary,
                    activities: currentItinerary.activities.filter(a => a.id !== activityId)
                };

                setCurrentItinerary(updatedItinerary);
                setItineraries(itineraries.map(it => it.id === currentItinerary.id ? updatedItinerary : it));
            };

            const deleteItinerary = (itineraryId) => {
                setItineraries(itineraries.filter(it => it.id !== itineraryId));
                if (currentItinerary && currentItinerary.id === itineraryId) {
                    setCurrentItinerary(null);
                }
            };

            const formatDate = (dateString) => {
                return new Date(dateString).toLocaleDateString('en-US', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            };

            const groupActivitiesByDate = (activities) => {
                return activities.reduce((groups, activity) => {
                    const date = activity.date;
                    if (!groups[date]) groups[date] = [];
                    groups[date].push(activity);
                    return groups;
                }, {});
            };

            // New Itinerary Modal Component
            const NewItineraryModal = () => {
                if (!showNewItinerary) return null;

                const renderCalendar = () => {
                    const daysInMonth = getDaysInMonth(calendarMonth);
                    const firstDay = getFirstDayOfMonth(calendarMonth);
                    const days = [];

                    // Empty cells for days before the first day of the month
                    for (let i = 0; i < firstDay; i++) {
                        days.push(React.createElement('div', { key: `empty-${i}`, className: 'calendar-day' }));
                    }

                    // Days of the month
                    for (let day = 1; day <= daysInMonth; day++) {
                        const date = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth(), day);
                        const isSelected = (selectedDates.start && date.getTime() === selectedDates.start.getTime()) ||
                            (selectedDates.end && date.getTime() === selectedDates.end.getTime());
                        const isInRange = isDateInRange(date);
                        const isPast = date < new Date().setHours(0, 0, 0, 0);

                        days.push(
                            React.createElement('div', {
                                key: day,
                                className: `calendar-day ${isSelected ? 'selected' : ''} ${isInRange ? 'in-range' : ''} ${isPast ? 'opacity-50 cursor-not-allowed' : ''}`,
                                onClick: isPast ? null : () => handleDateClick(day)
                            }, day)
                        );
                    }

                    return days;
                };

                return React.createElement('div', { className: "fixed inset-0 bg-black bg-opacity-50 modal-backdrop flex items-center justify-center z-50 p-4" },
                    React.createElement('div', { className: "bg-white rounded-2xl p-0 max-w-2xl w-full max-h-[90vh] overflow-y-auto" },
                        // Header
                        React.createElement('div', { className: "flex justify-between items-center p-6 border-b" },
                            React.createElement('h2', { className: "text-2xl font-semibold" },
                                currentStep === 'destination' ? 'Where to?' :
                                    currentStep === 'dates' ? 'When?' :
                                        currentStep === 'guests' ? 'Who\'s coming?' : 'Share your trip'
                            ),
                            React.createElement('button', {
                                onClick: resetNewItineraryForm,
                                className: "text-gray-400 hover:text-gray-600 text-2xl"
                            }, React.createElement(Icons.X))
                        ),

                        // Content based on step
                        React.createElement('div', { className: "p-6" },
                            currentStep === 'destination' && React.createElement('div', { className: "space-y-6" },
                                React.createElement('input', {
                                    type: "text",
                                    placeholder: "Search destinations",
                                    value: newItineraryForm.destination,
                                    onChange: (e) => setNewItineraryForm({ ...newItineraryForm, destination: e.target.value }),
                                    className: "w-full p-4 text-lg border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                }),
                                React.createElement('div', { className: "grid grid-cols-2 md:grid-cols-3 gap-4" },
                                    POPULAR_DESTINATIONS.map(dest => React.createElement('div', {
                                        key: dest.name,
                                        onClick: () => setNewItineraryForm({ ...newItineraryForm, destination: dest.name }),
                                        className: "destination-card cursor-pointer rounded-xl overflow-hidden"
                                    },
                                        React.createElement('div', { className: "relative h-32" },
                                            React.createElement('img', {
